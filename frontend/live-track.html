<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Track - TradeWise</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #eef2f7;
      color: #1f2937;
    }

    .page {
      max-width: 1450px;
      margin: auto;
      padding: 24px;
    }

    .hero {
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
    }

    .hero-left h2 {
      font-size: 22px;
      color: #4338ca;
      margin-bottom: 10px;
      text-decoration: underline;
    }

    .main-value {
      font-size: 54px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .gain, .loss {
      font-size: 22px;
      font-weight: 600;
    }

    .gain { color: #16a34a; }
    .loss { color: #dc2626; }

    .stats {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat {
      min-width: 140px;
    }

    .stat-label {
      color: #6b7280;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #1e3a8a;
    }

    .updated {
      font-size: 16px;
      color: #374151;
      font-weight: 600;
    }

    .hero-chart {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .section-title {
      font-size: 30px;
      font-weight: 700;
      margin: 18px 0 18px;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 24px;
    }

    .stock-card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .stock-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stock-info h3 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .stock-info p {
      color: #6b7280;
      font-size: 14px;
    }

    .live-badge {
      background: #dcfce7;
      color: #15803d;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      position: relative;
    }

    .live-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #16a34a;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .price-row {
      display: flex;
      gap: 18px;
      align-items: baseline;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .price {
      font-size: 34px;
      font-weight: 700;
    }

    .chg-up, .chg-down {
      font-size: 18px;
      font-weight: 600;
    }

    .chg-up { color: #16a34a; }
    .chg-down { color: #dc2626; }

    .chart-box {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .back-btn {
      display: inline-block;
      margin-top: 28px;
      text-decoration: none;
      background: #4338ca;
      color: white;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 600;
    }

    .back-btn:hover {
      background: #3730a3;
    }

    @media (max-width: 768px) {
      .main-value { font-size: 40px; }
      .stock-grid { grid-template-columns: 1fr; }
      .stock-card { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="hero-top">
        <div class="hero-left">
          <h2>NIFTY 50 ›</h2>
          <div id="niftyPrice" class="main-value">22,992.70</div>
          <div id="niftyChange" class="gain">+480.05 (2.13%)</div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-label">Open</div>
            <div id="niftyOpen" class="stat-value">22,878.45</div>
          </div>
          <div class="stat">
            <div class="stat-label">High</div>
            <div id="niftyHigh" class="stat-value">23,057.30</div>
          </div>
          <div class="stat">
            <div class="stat-label">Low</div>
            <div id="niftyLow" class="stat-value">22,624.20</div>
          </div>
          <div id="updatedTime" class="updated">Updated: --</div>
        </div>
      </div>

      <div class="hero-chart">
        <div id="niftyChart" style="height: 480px;"></div>
      </div>
    </div>

    <div class="section-title">Live Market Track</div>

    <div class="stock-grid" id="stockGrid"></div>

    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
  </div>

  <script>
    const nifty = {
      name: "NIFTY 50",
      price: 22992.70,
      prevClose: 22512.65,
      open: 22878.45,
      high: 23057.30,
      low: 22624.20
    };

    const stocks = [
      { symbol: "SBIN", company: "State Bank of India", price: 1223.30, prevClose: 1215.10, high: 1234.70, low: 1219.70, tv: "NSE:SBIN" },
      { symbol: "RELIANCE", company: "Reliance Industries", price: 2948.25, prevClose: 2926.85, high: 2962.30, low: 2914.50, tv: "NSE:RELIANCE" },
      { symbol: "TCS", company: "Tata Consultancy Services", price: 4012.80, prevClose: 4025.30, high: 4042.00, low: 3998.60, tv: "NSE:TCS" },
      { symbol: "INFY", company: "Infosys", price: 1628.45, prevClose: 1619.35, high: 1638.90, low: 1608.40, tv: "NSE:INFY" },
      { symbol: "HDFCBANK", company: "HDFC Bank", price: 1687.15, prevClose: 1681.45, high: 1696.20, low: 1672.40, tv: "NSE:HDFCBANK" },
      { symbol: "ICICIBANK", company: "ICICI Bank", price: 1098.40, prevClose: 1090.45, high: 1105.10, low: 1084.20, tv: "NSE:ICICIBANK" }
    ];

    function formatNumber(num) {
      return num.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatCurrency(num) {
      return "₹" + formatNumber(num);
    }

    function formatPercent(num) {
      return (num >= 0 ? "+" : "") + num.toFixed(2) + "%";
    }

    function formatDiff(num) {
      return (num >= 0 ? "+" : "") + formatNumber(num);
    }

    function updateTime() {
      const now = new Date();
      const options = {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      };
      document.getElementById("updatedTime").textContent =
        "Updated: " + now.toLocaleString("en-GB", options).replace(",", "") + " IST";
    }

    function renderNifty() {
      const diff = nifty.price - nifty.prevClose;
      const pct = (diff / nifty.prevClose) * 100;

      document.getElementById("niftyPrice").textContent = formatNumber(nifty.price);
      const changeEl = document.getElementById("niftyChange");
      changeEl.textContent = `${formatDiff(diff)} (${formatPercent(pct)})`;
      changeEl.className = pct >= 0 ? "gain" : "loss";

      document.getElementById("niftyOpen").textContent = formatNumber(nifty.open);
      document.getElementById("niftyHigh").textContent = formatNumber(nifty.high);
      document.getElementById("niftyLow").textContent = formatNumber(nifty.low);
    }

    function createStockCards() {
      const grid = document.getElementById("stockGrid");
      grid.innerHTML = stocks.map((stock, i) => `
        <div class="stock-card">
          <div class="stock-head">
            <div class="stock-info">
              <h3>${stock.symbol}</h3>
              <p>${stock.company}</p>
            </div>
            <div class="live-badge">LIVE</div>
          </div>

          <div class="price-row">
            <div class="price" id="price-${i}">${formatCurrency(stock.price)}</div>
            <div id="change-${i}" class="chg-up">+0.00 (+0.00%)</div>
          </div>

          <div class="chart-box">
            <div id="chart-${i}" style="height: 380px;"></div>
          </div>
        </div>
      `).join("");
    }

    function renderStockValues() {
      stocks.forEach((stock, i) => {
        const diff = stock.price - stock.prevClose;
        const pct = (diff / stock.prevClose) * 100;

        document.getElementById(`price-${i}`).textContent = formatCurrency(stock.price);

        const chgEl = document.getElementById(`change-${i}`);
        chgEl.textContent = `${formatDiff(diff)} (${formatPercent(pct)})`;
        chgEl.className = pct >= 0 ? "chg-up" : "chg-down";
      });
    }

    function randomMove(value, magnitude) {
      return value + (Math.random() * magnitude * 2 - magnitude);
    }

    function tickNifty() {
      const oldPrice = nifty.price;
      nifty.price = randomMove(nifty.price, 18);

      if (nifty.price > nifty.high) nifty.high = nifty.price;
      if (nifty.price < nifty.low) nifty.low = nifty.price;

      // open stays fixed for market day simulation
      if (Math.abs(nifty.price - oldPrice) < 0.5) {
        nifty.price += Math.random() > 0.5 ? 1.2 : -1.2;
      }

      renderNifty();
    }

    function tickStocks() {
      stocks.forEach(stock => {
        const oldPrice = stock.price;
        const magnitude = Math.max(stock.price * 0.0025, 1.5);
        stock.price = randomMove(stock.price, magnitude);

        if (stock.price > stock.high) stock.high = stock.price;
        if (stock.price < stock.low) stock.low = stock.price;

        if (Math.abs(stock.price - oldPrice) < 0.05) {
          stock.price += Math.random() > 0.5 ? 0.4 : -0.4;
        }
      });

      renderStockValues();
    }

    function buildWidgets() {
      new TradingView.widget({
        container_id: "niftyChart",
        width: "100%",
        height: 480,
        symbol: "NSE:NIFTY",
        interval: "5",
        timezone: "Asia/Kolkata",
        theme: "light",
        style: "2",
        locale: "en",
        toolbar_bg: "#f1f3f6",
        enable_publishing: false,
        hide_top_toolbar: false,
        hide_legend: false,
        save_image: false,
        studies: [],
        withdateranges: true,
        allow_symbol_change: true
      });

      stocks.forEach((stock, i) => {
        new TradingView.widget({
          container_id: `chart-${i}`,
          width: "100%",
          height: 380,
          symbol: stock.tv,
          interval: "D",
          timezone: "Asia/Kolkata",
          theme: "light",
          style: "2",
          locale: "en",
          toolbar_bg: "#f8fafc",
          enable_publishing: false,
          hide_top_toolbar: false,
          hide_legend: false,
          save_image: false,
          withdateranges: true,
          allow_symbol_change: false
        });
      });
    }

    createStockCards();
    renderNifty();
    renderStockValues();
    updateTime();
    buildWidgets();

    setInterval(() => {
      tickNifty();
      tickStocks();
      updateTime();
    }, 2000);
  </script>
</body>
</html>
